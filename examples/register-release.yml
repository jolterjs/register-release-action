name: Register Jolter release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Register release with Jolter
        uses: jolterjs/register-release-action@v1
        with:
          registry-url: ${{ vars.JOLTER_REGISTRY_URL }}
          plugin-name: ${{ vars.JOLTER_PLUGIN_NAME }}
          github-token: ${{ github.token }}
