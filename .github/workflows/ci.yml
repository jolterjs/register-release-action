name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  style:
    name: Style Gate (Prettier)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment: ci

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: bun install

      - name: Check formatting, then apply Prettier fixes if needed
        id: prettier
        shell: bash
        run: |
          set -euo pipefail

          if bun run format:check; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bun run format

          if git diff --quiet; then
            echo "::error::Formatting check failed but Prettier produced no changes."
            exit 1
          fi

          bun run format:check
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update Prettier PR
        if: steps.prettier.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "style: apply prettier formatting"
          branch: "automation/prettier-format"
          delete-branch: true
          title: "style: apply Prettier formatting"
          body: |
            ## Automated Prettier Formatting

            This pull request was created automatically by Register Jolter Release Action CI.

            ### Changes
            - Applied Prettier formatting
            - Re-ran the style gate successfully

            ### Automation
            This PR is safe to auto-merge once required checks pass.
          labels: |
            automated
            prettier
            style
            ci
          assignees: ${{ github.repository_owner }}
          author: "jolterbot <292917661+jolterbot@users.noreply.github.com>"
          committer: "jolterbot <292917661+jolterbot@users.noreply.github.com>"

      - name: Enable auto-merge for Prettier PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch

  quality:
    name: Quality (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    environment: ci

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify committed dist
        shell: bash
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::dist is out of date. Run 'bun run build' and commit the result."
            git diff -- dist
            exit 1
          fi
