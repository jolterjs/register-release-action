name: Documentation issue
description: Report missing, confusing, or incorrect documentation.
title: "Docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link to the page or name the file.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
      description: Explain what is missing, outdated, or confusing.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording
      description: Optional wording or examples that would help.
